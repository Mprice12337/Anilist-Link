<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Anilist-Link{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/img/anilist.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/"><img src="/static/img/anilist.png" alt="AniList" class="nav-brand-logo"><span><span class="brand-anilist">Anilist</span><span class="brand-link">Link</span></span></a>
        </div>
        <div class="nav-links">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/watchlist" class="{% if '/watchlist' in request.url.path %}active{% endif %}">Watchlist</a>
            <a href="/library" class="{% if '/library' in request.url.path %}active{% endif %}">Library</a>
            <a href="/watch-sync" class="{% if '/watch-sync' in request.url.path %}active{% endif %}">Watch Sync</a>
            <a href="/tools" class="{% if '/tools' in request.url.path or '/restructure' in request.url.path or '/crunchyroll' in request.url.path or '/download' in request.url.path %}active{% endif %}">Tools</a>
            <a href="/settings" class="{% if '/settings' in request.url.path %}active{% endif %}">Settings</a>
        </div>
    </nav>

    <!-- Persistent notification bar -->
    <div id="notification-bar" class="notification-bar"></div>

    <!-- Shared media detail modal + script (loaded before page content so inline scripts can use it) -->
    <div class="modal-backdrop hidden" id="mediaDetailModal" onclick="if(event.target===this)closeMediaDetail()">
      <div class="modal-box entry-detail-box" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2 id="mdTitle">Details</h2>
          <button class="modal-close" onclick="closeMediaDetail()">&times;</button>
        </div>
        <div class="modal-body entry-detail-body">
          <div class="entry-detail-poster-col">
            <div id="mdPosterWrap"></div>
          </div>
          <div class="entry-detail-info-col">
            <div class="entry-detail-top-row">
              <div id="mdTitleWrap" style="flex:1;min-width:0"></div>
              <div id="mdToolbar" class="entry-detail-toolbar"></div>
            </div>
            <div id="mdInfoGrid" class="entry-detail-grid"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="/static/media-detail.js"></script>

    <main class="{% block container_class %}container{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Anilist-Link v{{ version | default("0.1.0") }}</p>
    </footer>

    <!-- Processing overlay (shown when long-running forms submit) -->
    <div id="processing-overlay" class="processing-overlay hidden">
        <div class="processing-content">
            <span class="processing-spinner"></span>
            <span id="processing-label">Processing…</span>
        </div>
    </div>

    <!-- Floating progress widget -->
    <!-- Minimized: spinner circle bottom-right -->
    <button id="pw-mini" class="pw-mini hidden" title="Show background tasks">
        <span class="pw-mini-spinner"></span>
    </button>
    <!-- Expanded: bordered card bottom-right -->
    <div id="pw-panel" class="pw-panel hidden">
        <button class="pw-close" id="pw-minimize" title="Close">&times;</button>
        <div id="pw-tasks"></div>
    </div>

    <script>
    // Global HTML-escape utility used by multiple scripts
    window.escHtml = function (s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    };

    (function () {
        var mini  = document.getElementById('pw-mini');
        var panel = document.getElementById('pw-panel');
        var minBtn = document.getElementById('pw-minimize');
        var tasksEl = document.getElementById('pw-tasks');

        // Persist widget state across page navigations via sessionStorage
        var isMinimized = sessionStorage.getItem('pw-minimized') === '1';
        var wasActive = sessionStorage.getItem('pw-active') === '1';
        // Grace period: require several consecutive empty polls before
        // hiding, so transient gaps (e.g. between analysis → execution)
        // don't cause the widget to disappear.
        var emptyCount = 0;
        var EMPTY_GRACE = 3; // polls (~6 seconds at 2s interval)

        function saveState() {
            sessionStorage.setItem('pw-minimized', isMinimized ? '1' : '0');
            sessionStorage.setItem('pw-active', wasActive ? '1' : '0');
        }

        mini.addEventListener('click', function () {
            isMinimized = false;
            saveState();
            mini.classList.add('hidden');
            panel.classList.remove('hidden');
        });
        minBtn.addEventListener('click', function () {
            isMinimized = true;
            saveState();
            panel.classList.add('hidden');
            mini.classList.remove('hidden');
        });

        function renderTask(t) {
            var cancelBtn = '';
            if (t.cancellable && t.task_key) {
                cancelBtn =
                    '<button type="button" class="pw-cancel" ' +
                           'data-task-key="' + escHtml(t.task_key) + '" ' +
                           'data-task-label="' + escHtml(t.label) + '" ' +
                           'title="Cancel this task">✕</button>';
            }
            return '<div class="pw-task">' +
                '<div class="pw-task-head">' +
                    '<span class="pw-task-type">' + escHtml(t.type) + '</span>' +
                    '<span class="pw-task-label">' + escHtml(t.label) + '</span>' +
                    cancelBtn +
                '</div>' +
                '<div class="pw-bar"><div class="pw-bar-fill" style="width:' + t.percent + '%"></div></div>' +
                '<div class="pw-task-detail">' + escHtml(t.detail) + ' — ' + escHtml(t.status) + '</div>' +
            '</div>';
        }

        // Cancel-task handler — delegated so dynamically re-rendered buttons work.
        tasksEl.addEventListener('click', function (ev) {
            var btn = ev.target.closest && ev.target.closest('.pw-cancel');
            if (!btn) return;
            var key = btn.getAttribute('data-task-key');
            var label = btn.getAttribute('data-task-label') || key;
            if (!key) return;
            if (!confirm('Cancel "' + label + '"?\n\nIn-flight work will stop at the next safe point.')) {
                return;
            }
            btn.disabled = true;
            btn.textContent = '…';
            fetch('/api/tasks/' + encodeURIComponent(key) + '/cancel', {
                method: 'POST'
            }).then(function (r) {
                if (!r.ok) throw new Error('cancel failed');
                // Widget will reflect the new state on the next poll.
            }).catch(function () {
                alert('Cancel request failed — task may have already finished.');
                btn.disabled = false;
                btn.textContent = '✕';
            });
        });

        function poll() {
            fetch('/api/progress').then(function (r) {
                if (!r.ok) return;
                return r.json();
            }).then(function (data) {
                if (!data) return;
                var tasks = data.tasks || [];

                if (tasks.length === 0) {
                    emptyCount++;
                    if (wasActive && emptyCount >= EMPTY_GRACE) {
                        // Done: hide after grace period
                        if (!isMinimized) {
                            panel.classList.add('pw-done');
                            setTimeout(function () {
                                panel.classList.add('hidden');
                                panel.classList.remove('pw-done');
                            }, 1200);
                        }
                        mini.classList.add('hidden');
                        wasActive = false;
                        isMinimized = false;
                        saveState();
                        // Immediately refresh notifications so the user sees
                        // the "Review Plan" prompt without waiting for the
                        // next 5-second notification poll cycle.
                        if (window._refreshNotifications) window._refreshNotifications();
                    }
                    return;
                }

                emptyCount = 0;
                wasActive = true;
                saveState();
                tasksEl.innerHTML = tasks.map(renderTask).join('');
                if (isMinimized) {
                    mini.classList.remove('hidden');
                    panel.classList.add('hidden');
                } else {
                    panel.classList.remove('hidden');
                    mini.classList.add('hidden');
                }
            }).catch(function () {});
        }

        // On page load, restore widget visibility if it was active
        if (wasActive) {
            if (isMinimized) {
                mini.classList.remove('hidden');
            } else {
                panel.classList.remove('hidden');
            }
        }

        poll();
        setInterval(poll, 2000);
    })();

    // --- Persistent notifications (DB-backed, survives page reloads) ---
    // X button only hides for the current session (sessionStorage).
    // Notifications are permanently removed only when the user applies
    // results (server calls dismiss_notifications_by_url).
    (function () {
        const bar = document.getElementById('notification-bar');
        const HIDE_KEY = 'notif_hidden';
        let currentIds = '';  // track displayed IDs to skip no-op re-renders

        function getHidden() {
            try {
                return JSON.parse(sessionStorage.getItem(HIDE_KEY) || '[]');
            } catch (e) { return []; }
        }

        function renderNotification(n) {
            const actionBtn = n.action_url
                ? `<a href="${escHtml(n.action_url)}" class="notif-action">${escHtml(n.action_label || 'View')}</a>`
                : '';
            return `<div class="notif-item notif-${escHtml(n.type || 'info')}" data-id="${escHtml(n.id)}">
                <span class="notif-message">${escHtml(n.message)}</span>
                ${actionBtn}
                <button class="notif-dismiss" onclick="hideNotification('${escHtml(n.id)}')" title="Hide">&times;</button>
            </div>`;
        }

        async function pollNotifications() {
            try {
                const resp = await fetch('/api/notifications');
                if (!resp.ok) return;
                const data = await resp.json();
                const hidden = getHidden();
                const items = (data.notifications || []).filter(
                    n => !hidden.includes(n.id)
                );

                // Only re-render when the visible set actually changes
                const newIds = items.map(n => n.id).join(',');
                if (newIds === currentIds) return;
                currentIds = newIds;

                if (items.length === 0) {
                    bar.innerHTML = '';
                    bar.classList.remove('has-notifications');
                    return;
                }
                bar.innerHTML = items.map(renderNotification).join('');
                bar.classList.add('has-notifications');
            } catch (e) { /* ignore */ }
        }

        // Session-only hide (X button) — comes back on new session
        window.hideNotification = function(id) {
            const hidden = getHidden();
            if (!hidden.includes(id)) {
                hidden.push(id);
                sessionStorage.setItem(HIDE_KEY, JSON.stringify(hidden));
            }
            const el = bar.querySelector(`[data-id="${id}"]`);
            if (el) el.remove();
            currentIds = Array.from(bar.querySelectorAll('.notif-item'))
                .map(e => e.dataset.id).join(',');
            if (!bar.querySelector('.notif-item')) {
                bar.classList.remove('has-notifications');
            }
        };

        window._refreshNotifications = pollNotifications;
        pollNotifications();
        setInterval(pollNotifications, 5000);
    })();

    // Strip transient ?message= / ?error= from URL after render so that
    // refreshing the page does not re-display the same flash notification.
    (function () {
        var url = new URL(window.location.href);
        var changed = false;
        ['message', 'error'].forEach(function (k) {
            if (url.searchParams.has(k)) { url.searchParams.delete(k); changed = true; }
        });
        if (changed && window.history && window.history.replaceState) {
            window.history.replaceState({}, '', url.toString());
        }
    })();

    // --- Processing overlay for long-running forms ---
    (function () {
        const overlay = document.getElementById('processing-overlay');
        const label = document.getElementById('processing-label');
        document.addEventListener('submit', function (e) {
            const form = e.target;
            const msg = form.getAttribute('data-processing');
            if (!msg) return; // only intercept forms that opt in
            label.textContent = msg;
            overlay.classList.remove('hidden');
        });
    })();

    // --- Scroll-on-hover for truncated titles ---
    (function () {
        function initScrollOnHover(root) {
            (root || document).querySelectorAll('.scroll-on-hover').forEach(function (el) {
                // Wrap content in .scroll-inner if not already done
                if (!el.querySelector('.scroll-inner')) {
                    var inner = document.createElement('span');
                    inner.className = 'scroll-inner';
                    while (el.firstChild) inner.appendChild(el.firstChild);
                    el.appendChild(inner);
                }
                var inner = el.querySelector('.scroll-inner');
                el.addEventListener('mouseenter', function () {
                    // Use el.scrollWidth (reliable for block overflow:hidden containers)
                    // rather than inner.scrollWidth (unreliable for inline elements)
                    var overflow = el.scrollWidth - el.clientWidth;
                    if (overflow > 2) {
                        inner.style.setProperty('--scroll-dist', '-' + overflow + 'px');
                        inner.classList.add('is-scrolling');
                    }
                });
                el.addEventListener('mouseleave', function () {
                    inner.classList.remove('is-scrolling');
                    inner.style.removeProperty('--scroll-dist');
                });
            });
        }
        // Run immediately — script is at end of body, DOM is already available.
        // Do not use DOMContentLoaded; it can be missed when registered this late.
        initScrollOnHover(document);
        // Expose globally so dynamic content (modals, etc.) can reinitialise
        window.initScrollOnHover = initScrollOnHover;
    })();
    </script>
</body>
</html>
