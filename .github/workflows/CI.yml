name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run linter
        run: ruff check src/
      - name: Run formatter check
        run: black --check src/
      - name: Run type checker
        run: mypy src/
      - name: Run tests
        run: pytest --cov=src
